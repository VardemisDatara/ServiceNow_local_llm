include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml

stages:
  - test
  - sync

variables:
  CACHE_KEY: ${CI_COMMIT_REF_SLUG}

cache:
  key: ${CACHE_KEY}
  paths:
    - node_modules/

install_dependencies:
  stage: test
  image: node:20-alpine
  script:
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 week

code_quality:
  stage: test
  image: node:20-alpine
  needs: [install_dependencies]
  script:
    - npm run lint
  # Removed allow_failure to make quality gate blocking

sync-wiki-to-github:
  stage: sync
  image: alpine/git
  only:
    - main
  script:
    - apk add curl jq git
    - mkdir -p wiki
    - cd wiki
    - git init
    - git remote add github https://${GITHUB_WIKI_TOKEN}@github.com/VardemisDatara/ServiceNow_local_llm.wiki.git
    - git pull github master || true
    - 
    # Get all wiki pages from GitLab via MCP API
    - PAGES=$(curl -s -H "Authorization: Bearer 5aOHKXjrZmdAxtWK4RtajHudOOZjcEwhAXxR0yKuaVo" \
      "https://mcp.vardemis.tech/api/v1/gitlab/projects/9/wikis" | jq -r '.data.wikis[].slug')
    - 
    # Fetch each page and save as markdown
    - for slug in $PAGES; do
        curl -s -H "Authorization: Bearer 5aOHKXjrZmdAxtWK4RtajHudOOZjcEwhAXxR0yKuaVo" \
        "https://mcp.vardemis.tech/api/v1/gitlab/projects/9/wikis/${slug}" | \
        jq -r '.data.content' > "${slug}.md"
      done
    - 
    - git add .
    - git config user.email "ci@vardemis.tech"
    - git config user.name "CI Bot"
    - git commit -m "Update wiki from GitLab" || true
    - git push github master || true
  allow_failure: true
